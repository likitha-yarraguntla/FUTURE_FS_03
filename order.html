<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Now | Sri Balaji Ghee Sweets</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    .order-section{
      width:90%;
      max-width:700px;
      margin:60px auto;
      background:#fff;
      padding:40px;
      border-radius:20px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
      text-align:center;
    }

    .order-section h1{
      color:#c62828;
      margin-bottom:30px;
    }

    .order-form{
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .order-form input,
    .order-form textarea{
      padding:15px;
      border:1px solid #ddd;
      border-radius:10px;
      font-size:16px;
      outline:none;
    }

    .order-form textarea{
      height:120px;
      resize:none;
    }

    .submit-btn{
      background:#d62828;
      color:white;
      border:none;
      padding:15px;
      border-radius:30px;
      font-size:18px;
      cursor:pointer;
    }

    .submit-btn:hover{
      background:#b71c1c;
    }
  </style>
</head>
<body>

<header>
  <nav class="navbar">

    <div class="logo">
      🍬 Sri Balaji Ghee Sweets
    </div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

  </nav>
</header>

<section class="order-section">

  <h1>🛒 Place Your Order</h1>

  <form class="order-form">

    <input type="text" placeholder="Your Name" required>

    <input type="tel" placeholder="Phone Number" required>

    <input type="text" placeholder="Product Name" required>

    <input type="number" placeholder="Quantity (Kg / Box)" required>

    <textarea placeholder="Delivery Address"></textarea>

    <button type="submit" class="submit-btn">
      Submit Order
    </button>

  </form>

</section>


<footer>
  <p>© 2025 Sri Balaji Ghee Sweets | Sattenapalli</p>
</footer>

</body>
</html>
